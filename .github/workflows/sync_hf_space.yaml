name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-space:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: git clone https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mozilla-ai/README hf-space

      - name: Sync README and image assets
        run: |
          {
            cat HF_METADATA.md
            echo ""
            cat profile/README.md
          } > hf-space/README.md
          test -f profile/mozilla-ai-logo.svg
          test -d profile/social-icons
          cp profile/mozilla-ai-logo.svg hf-space/mozilla-ai-logo.svg
          if [ -e hf-space/social-icons ]; then
            rm -rf hf-space/social-icons
          fi
          cp -R profile/social-icons hf-space/social-icons

      - name: Commit changes
        run: |
          cd hf-space
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "Sync with https://github.com/mozilla-ai/.github"

      - name: Push to Hugging Face
        run: |
          cd hf-space
          git push https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/mozilla-ai/README main
